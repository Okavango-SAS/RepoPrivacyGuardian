[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --cov=Repo_Privacy_Guardian --cov-report=term-missing --cov-report=xml --cov-fail-under=100"

[tool.coverage.run]
branch = false
source = ["Repo_Privacy_Guardian"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 100
