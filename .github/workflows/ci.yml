name: ci

on:
  push:
    branches:
      - main
    paths:
      - ".github/CODEOWNERS"
      - ".github/workflows/ci.yml"
      - "config/requirements/**"
      - "pyproject.toml"
      - "Repo_Privacy_Guardian.py"
      - "repo_privacy_guardian/**"
      - "repo_privacy_guardian*.py"
      - "repo_privacy_guardian_assets/**"
      - "repo_privacy_guardian_resources/**"
      - "scripts/check_release_contract.py"
      - "scripts/release_readiness.py"
      - "scripts/visual_qa_gui.py"
      - "tests/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/CODEOWNERS"
      - ".github/workflows/ci.yml"
      - "config/requirements/**"
      - "pyproject.toml"
      - "Repo_Privacy_Guardian.py"
      - "repo_privacy_guardian/**"
      - "repo_privacy_guardian*.py"
      - "repo_privacy_guardian_assets/**"
      - "repo_privacy_guardian_resources/**"
      - "scripts/check_release_contract.py"
      - "scripts/release_readiness.py"
      - "scripts/visual_qa_gui.py"
      - "tests/**"
  workflow_dispatch:
    inputs:
      extended_checks:
        description: Run the manual extended validation suite
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Cost-first policy: automatic CI is path-gated to executable and validation-tooling surfaces.
  # Docs-only changes stay local-first; use workflow_dispatch when a protected PR needs a check.
  smoke:
    name: CLI smoke + release contract (automatic, ubuntu-latest, py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke CLI help
        run: repo-privacy-guardian --help

      - name: Smoke module help
        run: python -m Repo_Privacy_Guardian --help

      - name: Smoke direct script help
        run: python Repo_Privacy_Guardian.py --help

      - name: Check release contract drift
        run: python scripts/check_release_contract.py

      - name: Smoke CLI clean repo
        run: python tests/release_smoke_cli.py

  lint:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended_checks }}
    name: Ruff + Pyright (manual, ubuntu-latest, py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install GUI + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,test]"

      - name: Run ruff
        run: python -m ruff check .

      - name: Run pyright
        run: pyright -p pyrightconfig.json

  test:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended_checks }}
    name: CLI / pytest (manual, ubuntu-latest, py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install GUI + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,test]"

      - name: Run pytest
        run: python -m pytest

  package:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended_checks }}
    name: Package smoke (manual, ubuntu-latest, py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install wheel in clean venv
        run: |
          python -m venv .pkg-venv
          .pkg-venv/bin/python -m pip install --upgrade pip
          .pkg-venv/bin/python -m pip install dist/*.whl
          .pkg-venv/bin/repo-privacy-guardian --help
          .pkg-venv/bin/python -m Repo_Privacy_Guardian --help
          .pkg-venv/bin/python -c "from pathlib import Path; import Repo_Privacy_Guardian as rpg; assert Path(rpg.DEFAULT_POLICY).exists(), rpg.DEFAULT_POLICY"
          .pkg-venv/bin/python tests/release_smoke_cli.py

      - name: Install sdist in clean venv
        run: |
          rm -rf .pkg-venv
          python -m venv .pkg-venv
          .pkg-venv/bin/python -m pip install --upgrade pip
          .pkg-venv/bin/python -m pip install dist/*.tar.gz
          .pkg-venv/bin/repo-privacy-guardian --help
          .pkg-venv/bin/python -m Repo_Privacy_Guardian --help
          .pkg-venv/bin/python -c "from pathlib import Path; import Repo_Privacy_Guardian as rpg; assert Path(rpg.DEFAULT_POLICY).exists(), rpg.DEFAULT_POLICY"
          .pkg-venv/bin/python tests/release_smoke_cli.py

  gui-smoke-windows:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended_checks }}
    name: GUI smoke (manual, windows-2025-vs2026, py3.11)
    runs-on: windows-2025-vs2026
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install GUI + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,test]"

      - name: Smoke GUI initialization
        run: python tests/release_smoke_gui.py
