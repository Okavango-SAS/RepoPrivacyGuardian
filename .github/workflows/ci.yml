name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: CLI / pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke CLI help
        run: repo-privacy-guardian --help

      - name: Smoke module help
        run: python -m Repo_Privacy_Guardian --help

      - name: Smoke direct script help
        run: python Repo_Privacy_Guardian.py --help

      - name: Install test extras
        run: python -m pip install -e ".[test]"

      - name: Run pytest
        run: python -m pytest

      - name: Smoke CLI clean repo
        run: python tests/release_smoke_cli.py

  package:
    name: Package smoke (ubuntu-latest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install wheel in clean venv
        run: |
          python -m venv .pkg-venv
          .pkg-venv/bin/python -m pip install --upgrade pip
          .pkg-venv/bin/python -m pip install dist/*.whl
          .pkg-venv/bin/repo-privacy-guardian --help
          .pkg-venv/bin/python -m Repo_Privacy_Guardian --help
          .pkg-venv/bin/python -c "from pathlib import Path; import Repo_Privacy_Guardian as rpg; assert Path(rpg.DEFAULT_POLICY).exists(), rpg.DEFAULT_POLICY"
          .pkg-venv/bin/python tests/release_smoke_cli.py

      - name: Install sdist in clean venv
        run: |
          rm -rf .pkg-venv
          python -m venv .pkg-venv
          .pkg-venv/bin/python -m pip install --upgrade pip
          .pkg-venv/bin/python -m pip install dist/*.tar.gz
          .pkg-venv/bin/repo-privacy-guardian --help
          .pkg-venv/bin/python -m Repo_Privacy_Guardian --help
          .pkg-venv/bin/python -c "from pathlib import Path; import Repo_Privacy_Guardian as rpg; assert Path(rpg.DEFAULT_POLICY).exists(), rpg.DEFAULT_POLICY"
          .pkg-venv/bin/python tests/release_smoke_cli.py

  gui-smoke-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install GUI + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,test]"

      - name: Smoke GUI initialization
        run: python tests/release_smoke_gui.py
