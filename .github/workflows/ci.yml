name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke CLI help
        run: repo-privacy-guardian --help

      - name: Install test extras
        run: python -m pip install -e ".[test]"

      - name: Run pytest
        run: python -m pytest

      - name: Smoke CLI clean repo
        run: python tests/release_smoke_cli.py

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install wheel in clean venv
        run: |
          python -m venv .pkg-venv
          .pkg-venv/bin/python -m pip install --upgrade pip
          .pkg-venv/bin/python -m pip install dist/*.whl
          .pkg-venv/bin/repo-privacy-guardian --help
          .pkg-venv/bin/python -m Repo_Privacy_Guardian --help

  smoke-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke CLI help
        run: |
          repo-privacy-guardian --help
          python -m Repo_Privacy_Guardian --help

      - name: Install test extras
        run: python -m pip install -e ".[test]"

      - name: Smoke CLI clean repo
        run: python tests/release_smoke_cli.py
